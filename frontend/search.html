<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salon Ara — Randevu Deluxe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
/* ═══════════════════════════════════════════
   BASE
═══════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root,[data-theme="dark"]{
  --g1:#C9A84C; --g2:#E2C06A; --g3:#F5E4A8;
  --bg:#07070A; --s1:#0D0D12; --s2:#131318; --s3:#1A1A20; --s4:#222228;
  --br:rgba(255,255,255,.07); --br2:rgba(255,255,255,.12);
  --tx:#EDE9DF; --m1:#9A9690; --m2:#6A6660;
  --gr:#22C55E; --wa:#25D366;
  --r:14px;
}
[data-theme="light"]{
  --g1:#9A6D1A; --g2:#B8882A; --g3:#D4A030;
  --bg:#FFFFFF; --s1:#FAFAFA; --s2:#F4F4F6; --s3:#EBEBEE; --s4:#DCDCE0;
  --br:rgba(0,0,0,.08); --br2:rgba(0,0,0,.14);
  --tx:#111111; --m1:#52525B; --m2:#71717A;
  --gr:#16A34A; --wa:#128C4A;
}
html{font-size:16px;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;line-height:1.5;transition:background .3s,color .3s}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%,rgba(201,168,76,.1) 0%,transparent 60%);
}
*{position:relative;z-index:1}

.grad{background:linear-gradient(130deg,var(--g3) 0%,var(--g1) 50%,#9A6A20 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
.nav{
  position:sticky;top:0;z-index:900;
  height:60px;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(7,7,10,.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--br);
}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--tx);text-decoration:none}
.nav-logo b{color:var(--g1)}
.nav-back{
  display:flex;align-items:center;gap:6px;
  color:var(--m1);font-size:.83rem;text-decoration:none;
  padding:8px 14px;border:1px solid var(--br2);border-radius:10px;
  transition:all .2s;
}
.nav-back:hover{color:var(--tx);border-color:var(--g1);background:rgba(201,168,76,.06)}

/* ═══════════════════════════════════════════
   HERO / SEARCH HEADER
═══════════════════════════════════════════ */
.search-hero{
  padding:40px 20px 32px;
  text-align:center;
  max-width:720px;margin:0 auto;
}
.search-hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,5vw,2.4rem);
  font-weight:900;line-height:1.2;
  margin-bottom:8px;
}
.search-hero p{
  color:var(--m1);font-size:.9rem;margin-bottom:28px;
}

/* Search Box */
.search-box{
  background:var(--s2);
  border:1px solid var(--br2);
  border-radius:16px;
  padding:4px;
  display:flex;
  flex-direction:column;
  gap:4px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.search-row{
  display:flex;align-items:center;gap:10px;
  background:var(--s3);border-radius:12px;
  padding:10px 14px;
}
.search-row svg{color:var(--m2);flex-shrink:0;width:18px;height:18px}
.search-row input,
.search-row select{
  flex:1;background:none;border:none;outline:none;
  color:var(--tx);font-family:inherit;font-size:.9rem;
}
.search-row select option{background:var(--s3);color:var(--tx)}
.search-row input::placeholder{color:var(--m2)}
.search-divider{width:1px;height:20px;background:var(--br2);flex-shrink:0}

.search-btn{
  width:100%;padding:13px;
  background:var(--g1);color:#080808;
  border:none;border-radius:10px;
  font-family:inherit;font-size:.9rem;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.search-btn:hover{background:var(--g2);transform:translateY(-1px)}

@media(min-width:600px){
  .search-box{flex-direction:row;padding:6px}
  .search-row{flex:1;background:transparent;border-right:1px solid var(--br2);border-radius:0}
  .search-row:last-of-type{border-right:none}
  .search-btn{width:auto;padding:13px 24px;border-radius:10px;white-space:nowrap}
}

/* ═══════════════════════════════════════════
   CATEGORY PILLS
═══════════════════════════════════════════ */
.cat-section{
  max-width:960px;margin:0 auto;
  padding:0 16px 24px;
}
.cat-scroll{
  display:flex;gap:8px;
  overflow-x:auto;
  padding-bottom:6px;
  scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar{display:none}

.cat-pill{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;
  border:1px solid var(--br2);background:var(--s2);
  border-radius:100px;font-size:.82rem;color:var(--m1);
  cursor:pointer;transition:all .2s;white-space:nowrap;
  flex-shrink:0;
}
.cat-pill:hover{border-color:var(--g1);color:var(--g2);background:rgba(201,168,76,.06)}
.cat-pill.active{border-color:var(--g1);color:var(--g1);background:rgba(201,168,76,.1)}
.cat-pill .cat-icon{font-size:1rem}

/* ═══════════════════════════════════════════
   RESULTS SECTION
═══════════════════════════════════════════ */
.results-section{
  max-width:960px;margin:0 auto;
  padding:0 16px 80px;
}

.results-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
  flex-wrap:wrap;gap:8px;
}
.results-count{
  font-size:.85rem;color:var(--m1);
}
.results-count b{color:var(--tx)}

.sort-select{
  background:var(--s2);border:1px solid var(--br2);
  border-radius:8px;padding:6px 12px;
  color:var(--tx);font-family:inherit;font-size:.82rem;
  cursor:pointer;outline:none;
}
.sort-select option{background:var(--s2)}

/* Salon Cards Grid */
.salon-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}
@media(min-width:540px){.salon-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:860px){.salon-grid{grid-template-columns:repeat(3,1fr)}}

.salon-card{
  background:var(--s2);
  border:1px solid var(--br);
  border-radius:var(--r);
  overflow:hidden;
  transition:all .25s;
  cursor:pointer;
  display:flex;flex-direction:column;
}
.salon-card:hover{
  border-color:rgba(201,168,76,.25);
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(0,0,0,.4);
}

/* Card Banner */
.salon-banner{
  height:90px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;
  position:relative;
  flex-shrink:0;
}
.salon-banner::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 40%,var(--s2) 100%);
}

/* Plan badge on banner */
.salon-plan-badge{
  position:absolute;top:10px;right:10px;
  padding:3px 10px;border-radius:100px;
  font-size:.68rem;font-weight:700;letter-spacing:.5px;
  z-index:2;
}
.badge-pro{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.35);color:var(--g2)}
.badge-lux{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.35);color:#a78bfa}
.badge-std{background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.25);color:#67e8f9}
.badge-free{display:none}

.salon-body{
  padding:14px 16px 16px;
  flex:1;display:flex;flex-direction:column;
}
.salon-name{
  font-weight:700;font-size:.95rem;margin-bottom:2px;
  color:var(--tx);
}
.salon-cat{
  font-size:.78rem;color:var(--m1);margin-bottom:10px;
}

.salon-meta{
  display:flex;align-items:center;gap:12px;
  flex-wrap:wrap;margin-bottom:12px;
}
.salon-city{
  display:flex;align-items:center;gap:4px;
  font-size:.78rem;color:var(--m2);
}
.salon-rating{
  display:flex;align-items:center;gap:4px;
  font-size:.78rem;color:var(--m1);
}
.salon-rating .star{color:var(--g1)}

.salon-services{
  display:flex;flex-wrap:wrap;gap:5px;
  margin-bottom:14px;flex:1;
}
.svc-tag{
  padding:3px 9px;
  background:var(--s3);border:1px solid var(--br);
  border-radius:6px;font-size:.72rem;color:var(--m1);
}

.salon-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:12px;border-top:1px solid var(--br);
}
.salon-price-hint{font-size:.75rem;color:var(--m2)}
.salon-price-hint b{color:var(--tx);font-size:.85rem}

.btn-book{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;
  background:var(--g1);color:#080808;
  border:none;border-radius:9px;
  font-family:inherit;font-size:.78rem;font-weight:700;
  cursor:pointer;transition:all .2s;text-decoration:none;
  white-space:nowrap;
}
.btn-book:hover{background:var(--g2);transform:translateY(-1px)}

/* WA button variant */
.btn-wa{
  background:#128C7E;color:#fff;
}
.btn-wa:hover{background:#25D366}

/* ═══════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════ */
.empty-state{
  text-align:center;padding:60px 20px;
  display:none;
}
.empty-state.visible{display:block}
.empty-icon{font-size:3rem;margin-bottom:12px}
.empty-state h3{font-size:1.1rem;margin-bottom:6px;color:var(--tx)}
.empty-state p{color:var(--m1);font-size:.85rem}

/* ═══════════════════════════════════════════
   SKELETON LOADER
═══════════════════════════════════════════ */
@keyframes shimmer{
  0%{background-position:-400px 0}
  100%{background-position:400px 0}
}
.skeleton{
  background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);
  background-size:800px 100%;
  animation:shimmer 1.4s infinite;
  border-radius:8px;
}

/* ═══════════════════════════════════════════
   CITY QUICK-PICKS
═══════════════════════════════════════════ */
.cities-row{
  display:flex;gap:8px;overflow-x:auto;
  padding:0 16px 20px;
  max-width:960px;margin:0 auto;
  scrollbar-width:none;
}
.cities-row::-webkit-scrollbar{display:none}

.city-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 18px;
  border:1px solid var(--br2);background:var(--s2);
  border-radius:12px;cursor:pointer;transition:all .2s;
  flex-shrink:0;text-decoration:none;
}
.city-btn:hover,.city-btn.active{border-color:var(--g1);background:rgba(201,168,76,.07)}
.city-btn span:first-child{font-size:1.2rem}
.city-btn span:last-child{font-size:.72rem;color:var(--m1);white-space:nowrap}
.city-btn.active span:last-child{color:var(--g2)}

/* ═══════════════════════════════════════════
   MODAL — Salon Detail
═══════════════════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
@media(min-width:600px){
  .modal-overlay{align-items:center}
}

.modal-sheet{
  background:var(--s1);
  border:1px solid var(--br2);
  border-radius:20px 20px 0 0;
  width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;
  padding:20px 20px 40px;
}
@media(min-width:600px){
  .modal-sheet{border-radius:20px;max-height:80vh}
}

.modal-handle{
  width:36px;height:4px;
  background:var(--br2);border-radius:4px;
  margin:0 auto 20px;
}
.modal-salon-banner{
  height:80px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;margin-bottom:16px;
}
.modal-salon-name{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:4px}
.modal-salon-cat{font-size:.82rem;color:var(--m1);margin-bottom:16px}
.modal-section-title{font-size:.75rem;font-weight:700;color:var(--m2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.modal-services-list{
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;
}
.modal-svc{
  padding:5px 12px;background:var(--s3);border:1px solid var(--br);
  border-radius:8px;font-size:.82rem;color:var(--tx);
}
.modal-actions{display:flex;flex-direction:column;gap:10px}
.modal-btn{
  padding:14px;border:none;border-radius:12px;
  font-family:inherit;font-size:.9rem;font-weight:700;
  cursor:pointer;transition:all .2s;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.modal-btn-primary{background:var(--g1);color:#080808}
.modal-btn-primary:hover{background:var(--g2)}
.modal-btn-wa{background:#128C7E;color:#fff}
.modal-btn-wa:hover{background:#25D366}
.modal-btn-sec{background:var(--s3);color:var(--tx);border:1px solid var(--br2)}
.modal-btn-sec:hover{border-color:var(--g1);color:var(--g2)}
.modal-close-btn{
  position:absolute;top:20px;right:20px;
  width:32px;height:32px;border-radius:50%;
  background:var(--s3);border:1px solid var(--br2);
  color:var(--m1);cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.modal-close-btn:hover{color:var(--tx);border-color:var(--br2)}

.modal-info-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 0;border-bottom:1px solid var(--br);
  font-size:.85rem;
}
.modal-info-row:last-child{border-bottom:none}
.modal-info-row .icon{font-size:1rem;width:24px;text-align:center;flex-shrink:0}
.modal-info-row span{color:var(--m1)}
.modal-info-row b{color:var(--tx)}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="index.html" class="nav-logo"><b>Randevu</b> Deluxe</a>
  <button id="sr-theme-btn" onclick="toggleSearchTheme()"
    style="background:transparent;border:1px solid var(--br2);color:var(--m1);
           border-radius:8px;padding:6px 10px;font-size:.82rem;font-weight:600;
           cursor:pointer;font-family:inherit;transition:all .2s;margin-left:auto;margin-right:10px">☀️</button>
  <a href="index.html" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Ana Sayfa
  </a>
</nav>

<!-- SEARCH HERO -->
<div class="search-hero">
  <h1>Yakınındaki <span class="grad">salonu</span> bul</h1>
  <p>2.400+ kuaför, berber ve güzellik salonu arasından seç, anında randevu al.</p>

  <div class="search-box">
    <div class="search-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <input id="city-input" type="text" placeholder="Şehir veya ilçe (örn. Kadıköy)" autocomplete="off">
    </div>
    <div class="search-row">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <select id="cat-select">
        <option value="">Tüm kategoriler</option>
        <option value="berber">Berber</option>
        <option value="kadin-kuafor">Kadın Kuaförü</option>
        <option value="erkek-kuafor">Erkek Kuaförü</option>
        <option value="guzellik">Güzellik Salonu</option>
        <option value="nail">Nail Studio</option>
        <option value="cilt">Cilt Bakımı</option>
        <option value="masaj">Masaj</option>
      </select>
    </div>
    <button class="search-btn" onclick="doSearch()">
      Salon Ara
    </button>
  </div>
</div>

<!-- CITY QUICK PICKS -->
<div class="cities-row" id="cities-row">
  <a class="city-btn active" data-city="Tümü" onclick="filterCity('Tümü',this)">
    <span>🗺️</span><span>Tümü</span>
  </a>
  <a class="city-btn" data-city="İstanbul" onclick="filterCity('İstanbul',this)">
    <span>🌉</span><span>İstanbul</span>
  </a>
  <a class="city-btn" data-city="Ankara" onclick="filterCity('Ankara',this)">
    <span>🏛️</span><span>Ankara</span>
  </a>
  <a class="city-btn" data-city="İzmir" onclick="filterCity('İzmir',this)">
    <span>🌊</span><span>İzmir</span>
  </a>
  <a class="city-btn" data-city="Bursa" onclick="filterCity('Bursa',this)">
    <span>🏔️</span><span>Bursa</span>
  </a>
  <a class="city-btn" data-city="Antalya" onclick="filterCity('Antalya',this)">
    <span>🌴</span><span>Antalya</span>
  </a>
  <a class="city-btn" data-city="Konya" onclick="filterCity('Konya',this)">
    <span>🕌</span><span>Konya</span>
  </a>
</div>

<!-- CATEGORY PILLS -->
<div class="cat-section">
  <div class="cat-scroll" id="cat-pills">
    <button class="cat-pill active" data-cat="" onclick="filterCat('',this)">
      <span class="cat-icon">✦</span> Tümü
    </button>
    <button class="cat-pill" data-cat="berber" onclick="filterCat('berber',this)">
      <span class="cat-icon">✂️</span> Berber
    </button>
    <button class="cat-pill" data-cat="kadin-kuafor" onclick="filterCat('kadin-kuafor',this)">
      <span class="cat-icon">💇‍♀️</span> Kadın Kuaförü
    </button>
    <button class="cat-pill" data-cat="erkek-kuafor" onclick="filterCat('erkek-kuafor',this)">
      <span class="cat-icon">💈</span> Erkek Kuaförü
    </button>
    <button class="cat-pill" data-cat="guzellik" onclick="filterCat('guzellik',this)">
      <span class="cat-icon">💄</span> Güzellik Salonu
    </button>
    <button class="cat-pill" data-cat="nail" onclick="filterCat('nail',this)">
      <span class="cat-icon">💅</span> Nail Studio
    </button>
    <button class="cat-pill" data-cat="cilt" onclick="filterCat('cilt',this)">
      <span class="cat-icon">🧴</span> Cilt Bakımı
    </button>
    <button class="cat-pill" data-cat="masaj" onclick="filterCat('masaj',this)">
      <span class="cat-icon">💆</span> Masaj
    </button>
  </div>
</div>

<!-- RESULTS -->
<div class="results-section">
  <div class="results-meta">
    <div class="results-count" id="results-count">
      <b>24</b> salon bulundu
    </div>
    <select class="sort-select" id="sort-select" onchange="sortResults()">
      <option value="rating">En yüksek puan</option>
      <option value="name">İsme göre (A-Z)</option>
      <option value="newest">En yeni</option>
    </select>
  </div>

  <div class="salon-grid" id="salon-grid"></div>
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">🔍</div>
    <h3>Sonuç bulunamadı</h3>
    <p>Farklı bir şehir veya kategori deneyin.</p>
  </div>
</div>

<!-- SALON DETAIL MODAL -->
<div class="modal-overlay" id="salon-modal" onclick="handleModalClick(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <button class="modal-close-btn" onclick="closeModal()">✕</button>

    <div class="modal-salon-banner" id="modal-banner"></div>
    <div id="modal-plan-badge"></div>
    <div class="modal-salon-name" id="modal-name"></div>
    <div class="modal-salon-cat" id="modal-cat"></div>

function toggleSearchTheme(){
  var c=document.documentElement.getAttribute('data-theme')||'dark';
  var n=c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('rd-theme',n);
  var b=document.getElementById('sr-theme-btn');

}
